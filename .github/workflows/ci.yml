name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check (AST parse)
        run: |
          python - <<'PY'
          import ast
          import pathlib
          import sys

          failures = []
          for path in pathlib.Path('.').rglob('*.py'):
              if '.venv' in path.parts or '.git' in path.parts:
                  continue
              try:
                  ast.parse(path.read_text(encoding='utf-8'), filename=str(path))
              except SyntaxError as exc:
                  failures.append(f"{path}:{exc.lineno}:{exc.offset} {exc.msg}")

          if failures:
              print('Syntax errors found:')
              for item in failures:
                  print(item)
              sys.exit(1)

          print('All Python files parsed successfully.')
          PY

      - name: Validate repository outputs (non-strict)
        run: python scripts/validate_outputs.py
